services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: socialbridge
      POSTGRES_USER: socialbridge
      POSTGRES_PASSWORD: socialbridge
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialbridge -d socialbridge"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
