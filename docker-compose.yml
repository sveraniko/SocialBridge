name: socialbridge

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: socialbridge
      POSTGRES_USER: socialbridge
      POSTGRES_PASSWORD: socialbridge
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialbridge -d socialbridge"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  wizard:
    build: .
    command: python -m wizard_bot
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      api:
        condition: service_started

